name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo test -p hyle
        run: cargo test -p hyle

      - name: cargo test -p hyle-dioxus
        run: cargo test -p hyle-dioxus

  npm:
    name: npm build & test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [hyle-react, hyle-react-dom]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages/${{ matrix.package }}

      - name: Build
        run: npm run build
        working-directory: packages/${{ matrix.package }}

      - name: Test
        run: npm test
        working-directory: packages/${{ matrix.package }}
